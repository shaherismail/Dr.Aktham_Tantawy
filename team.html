<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تعرف على الأطباء والاستشاريين المتميزين في عيادة الدكتور أكثم طنطاوي لطب وجراحة الأسنان.">
    <title>فريق العمل - عيادة د. أكثم طنطاوي</title>
    <!-- Boxicons CDN for premium icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

    <!-- Mode Switcher Floating Panel -->
    <div class="mode-switch-panel">
        <div class="floating-switcher">
            <button id="viewLiveBtn" class="switcher-btn active" onclick=\"window.location.href='team'\">
                <i class="bx bx-world"></i> الموقع التفاعلي
            </button>
            <button id="viewFigmaBtn" class="switcher-btn" onclick=\"window.location.href='figma'\">
                <i class="bx bx-palette"></i> Figma Mockups
            </button>
        </div>
    </div>

    <!-- MAIN APP ROOT -->
    <div id="app-root">
        <header id="header-nav"></header>

        <main class="main-content">
            <!-- PAGE 11: MEDICAL TEAM PAGE -->
            <section id="team-page" class="page-view">
                <div class="container team-section">
                    <div class="section-header">
                        <span class="section-label">فريقنا الطبي</span>
                        <h2 class="section-title">نخبة من الاستشاريين والأخصائيين</h2>
                        <p class="section-desc">فريق طبي متميز يعمل بشغف لتقديم أفضل تجربة علاجية للمرضى</p>
                    </div>

                    <div class="grid-4">
                        <!-- Member 1 -->
                        <div class="glass-card team-card">
                            <div class="team-avatar-wrapper">
                                <svg class="team-avatar-svg" viewBox="0 0 100 100">
                                    <circle cx="50" cy="50" r="45" fill="#4DA3FF" opacity="0.2"/>
                                    <path d="M50 70 C65 70, 75 78, 75 90 L25 90 C25 78, 35 70, 50 70 Z" fill="#0D6EFD"/>
                                    <circle cx="50" cy="45" r="18" fill="#FFE0B2"/>
                                </svg>
                            </div>
                            <h3 class="team-name">د. أكثم إسماعيل طنطاوي</h3>
                            <span class="team-role">استشاري زراعة الأسنان</span>
                            <div class="team-socials">
                                <a href="#" class="team-social-icon"><i class="bx bxl-linkedin"></i></a>
                                <a href="#" class="team-social-icon"><i class="bx bxl-twitter"></i></a>
                            </div>
                        </div>
                        <!-- Member 2 -->
                        <div class="glass-card team-card">
                            <div class="team-avatar-wrapper">
                                <svg class="team-avatar-svg" viewBox="0 0 100 100">
                                    <circle cx="50" cy="50" r="45" fill="#16A34A" opacity="0.2"/>
                                    <path d="M50 70 C65 70, 75 78, 75 90 L25 90 C25 78, 35 70, 50 70 Z" fill="#16A34A"/>
                                    <circle cx="50" cy="45" r="18" fill="#FFE0B2"/>
                                </svg>
                            </div>
                            <h3 class="team-name">د. يوسف طارق</h3>
                            <span class="team-role">استشاري تقويم الأسنان</span>
                            <div class="team-socials">
                                <a href="#" class="team-social-icon"><i class="bx bxl-linkedin"></i></a>
                                <a href="#" class="team-social-icon"><i class="bx bxl-twitter"></i></a>
                            </div>
                        </div>
                        <!-- Member 3 -->
                        <div class="glass-card team-card">
                            <div class="team-avatar-wrapper">
                                <svg class="team-avatar-svg" viewBox="0 0 100 100">
                                    <circle cx="50" cy="50" r="45" fill="#4DA3FF" opacity="0.2"/>
                                    <path d="M50 70 C65 70, 75 78, 75 90 L25 90 C25 78, 35 70, 50 70 Z" fill="#0D6EFD"/>
                                    <circle cx="50" cy="45" r="18" fill="#FFE0B2"/>
                                </svg>
                            </div>
                            <h3 class="team-name">د. مروان أحمد</h3>
                            <span class="team-role">أخصائي علاج الجذور</span>
                            <div class="team-socials">
                                <a href="#" class="team-social-icon"><i class="bx bxl-linkedin"></i></a>
                                <a href="#" class="team-social-icon"><i class="bx bxl-twitter"></i></a>
                            </div>
                        </div>
                        <!-- Member 4 -->
                        <div class="glass-card team-card">
                            <div class="team-avatar-wrapper">
                                <svg class="team-avatar-svg" viewBox="0 0 100 100">
                                    <circle cx="50" cy="50" r="45" fill="#F43F5E" opacity="0.2"/>
                                    <path d="M50 70 C65 70, 75 78, 75 90 L25 90 C25 78, 35 70, 50 70 Z" fill="#F43F5E"/>
                                    <circle cx="50" cy="45" r="18" fill="#FFE0B2"/>
                                    <!-- Hair details -->
                                    <path d="M35 45 C35 30, 65 30, 65 45" stroke="#3E2723" stroke-width="6"/>
                                </svg>
                            </div>
                            <h3 class="team-name">د. ليلى عثمان</h3>
                            <span class="team-role">أخصائية طب أسنان الأطفال</span>
                            <div class="team-socials">
                                <a href="#" class="team-social-icon"><i class="bx bxl-linkedin"></i></a>
                                <a href="#" class="team-social-icon"><i class="bx bxl-instagram"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer id="footer-wrapper"></footer>
    </div>

    <!-- Application Script Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Application Script Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
