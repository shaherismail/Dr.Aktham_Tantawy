name: Supabase Keep-Alive

on:
  schedule:
    # Run every 5 days at 00:00 UTC
    - cron: '0 0 */5 * *'
  workflow_dispatch: # Allow manual run

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "⚠️ Warning: SUPABASE_URL or SUPABASE_ANON_KEY secret is not set in GitHub repository settings."
            echo "Skipping ping. Please configure these secrets to keep your database active."
            exit 0
          fi
          
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/bookings?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
