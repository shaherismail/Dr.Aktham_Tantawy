<!-- FLOATING TELEGRAM SIMULATOR WIDGET -->
<div class="tg-simulator-widget" id="tgSimulatorWidget">
    <button class="tg-sim-launcher" id="tgSimLauncher">
        <i class="bx bxl-telegram"></i>
        <span class="tg-badge" id="tgSimBadge" style="display: none;">1</span>
    </button>
    
    <div class="tg-sim-chatbox" id="tgSimChatbox">
        <div class="tg-sim-header">
            <div class="tg-sim-avatar">
                <i class="bx bxl-telegram"></i>
            </div>
            <div class="tg-sim-header-info">
                <span class="tg-sim-bot-name">بوت عيادة د. أكثم</span>
                <span class="tg-sim-bot-status">نشط الآن (محاكي التليجرام)</span>
            </div>
            <button class="tg-sim-close" id="tgSimClose"><i class="bx bx-x"></i></button>
        </div>
        
        <div class="tg-sim-messages" id="tgSimMessages">
            <div class="tg-msg tg-msg-system">
                أهلاً بك في نظام محاكاة تليجرام التفاعلي. عند إرسال طلب حجز، ستظهر هنا رسالة تفاعلية تحتوي على زر "موافق" لتأكيد الحجز كما تظهر للطبيب تماماً.
            </div>
        </div>
    </div>
</div>
