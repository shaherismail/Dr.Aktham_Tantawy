<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ترقبوا الإطلاق الكبير لمركز الدكتور أكثم طنطاوي الرقمي الجديد لتجميل الأسنان وتصميم الابتسامة ثلاثية الأبعاد.">
    <title>ترقبونا قريباً - عيادة د. أكثم طنطاوي</title>
    <!-- Boxicons CDN for premium icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

    <!-- Mode Switcher Floating Panel -->
    <div class="mode-switch-panel">
        <div class="floating-switcher">
            <button id="viewLiveBtn" class="switcher-btn active" onclick=\"window.location.href='upcoming'\">
                <i class="bx bx-world"></i> الموقع التفاعلي
            </button>
            <button id="viewFigmaBtn" class="switcher-btn" onclick=\"window.location.href='figma'\">
                <i class="bx bx-palette"></i> Figma Mockups
            </button>
        </div>
    </div>

    <!-- MAIN APP ROOT -->
    <div id="app-root">
        <header id="header-nav"></header>

        <main class="main-content">
            <!-- PAGE 14: UPCOMING SERVICES PAGE -->
            <section id="upcoming-page" class="page-view">
                <div class="container upcoming-section">
                    <div class="glass-card upcoming-card">
                        <div class="upcoming-content">
                            <span class="section-label">ترقبونا قريباً</span>
                            <h2 class="doctor-bio-title" style="font-size: 32px; margin-top: 10px;">إطلاق مركز تجميل الأسنان الرقمي</h2>
                            <p class="doctor-bio-text">
                                نعمل حالياً على تجهيز قسم التجميل الرقمي الأكثر تطوراً بالمنطقة لتصميم الابتسامة ثلاثية الأبعاد وتركيبات الزيركون الفورية في دقائق معدودة.
                            </p>
                            
                            <div class="countdown-grid">
                                <div class="countdown-cell">
                                    <div class="countdown-val" id="countDays">45</div>
                                    <div class="countdown-lbl">يوم</div>
                                </div>
                                <div class="countdown-cell">
                                    <div class="countdown-val" id="countHours">12</div>
                                    <div class="countdown-lbl">ساعة</div>
                                </div>
                                <div class="countdown-cell">
                                    <div class="countdown-val" id="countMins">34</div>
                                    <div class="countdown-lbl">دقيقة</div>
                                </div>
                                <div class="countdown-cell">
                                    <div class="countdown-val" id="countSecs">56</div>
                                    <div class="countdown-lbl">ثانية</div>
                                </div>
                            </div>
                            
                            <a href="booking" class="btn btn-primary">حجز موعد مبكر مسبق</a>
                        </div>
                        <div class="upcoming-illustration">
                            <!-- 3D Launch Rocket SVG -->
                            <svg width="100%" height="280" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient id="rocketGrad" x1="100" y1="40" x2="100" y2="160" gradientUnits="userSpaceOnUse">
                                        <stop offset="0%" stop-color="#0D6EFD"/>
                                        <stop offset="100%" stop-color="#4DA3FF"/>
                                    </linearGradient>
                                </defs>
                                <g filter="url(#shadow-illustration)">
                                    <!-- Rocket Frame -->
                                    <path d="M100 30 C120 70, 125 130, 115 150 L85 150 C75 130, 80 70, 100 30 Z" fill="url(#rocketGrad)"/>
                                    <!-- Side wings -->
                                    <path d="M85 130 L70 155 L85 150 Z" fill="#0A58CA"/>
                                    <path d="M115 130 L130 155 L115 150 Z" fill="#0A58CA"/>
                                    <!-- Window -->
                                    <circle cx="100" cy="80" r="14" fill="#FFFFFF" stroke="#0D6EFD" stroke-width="3"/>
                                    <!-- Fire trail -->
                                    <path d="M90 155 L100 185 L110 155 Z" fill="#FF8A00"/>
                                </g>
                            </svg>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer id="footer-wrapper"></footer>
    </div>

    <!-- Application Script Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Application Script Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
