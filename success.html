<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تمت عملية الحجز بنجاح - عيادة الدكتور أكثم طنطاوي لطب الأسنان.">
    <title>تأكيد الحجز - عيادة د. أكثم طنطاوي</title>
    <!-- Boxicons CDN for premium icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

    <!-- Mode Switcher Floating Panel -->
    <div class="mode-switch-panel">
        <div class="floating-switcher">
            <button id="viewLiveBtn" class="switcher-btn active" onclick=\"window.location.href='success'\">
                <i class="bx bx-world"></i> الموقع التفاعلي
            </button>
            <button id="viewFigmaBtn" class="switcher-btn" onclick=\"window.location.href='figma'\">
                <i class="bx bx-palette"></i> Figma Mockups
            </button>
        </div>
    </div>

    <!-- MAIN APP ROOT -->
    <div id="app-root">
        <header id="header-nav"></header>

        <main class="main-content">
            <!-- PAGE 15: SUCCESS CONFIRMATION PAGE -->
            <section id="success-page" class="page-view">
                <div class="container success-page-wrapper">
                    <div class="glass-card success-card">
                        <div class="success-icon-wrapper">
                            <i class="bx bx-check-circle"></i>
                        </div>
                        <h2 class="doctor-bio-title" style="font-size: 28px;">تم تأكيد موعدك بنجاح!</h2>
                        <p class="doctor-bio-text" style="text-align: center; margin-bottom: 12px;">
                            شكراً لثقتكم بعيادتنا. تم جدولة الموعد بنجاح، وسيتواصل معك موظف الاستقبال لتأكيد الحجز النهائي عبر الجوال خلال دقائق.
                        </p>
                        
                        <div class="success-details-card">
                            <div class="detail-row">
                                <span class="detail-label">اسم المريض:</span>
                                <span class="detail-val" id="confirmName">محمد علي</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">رقم الجوال:</span>
                                <span class="detail-val" id="confirmPhone">0505555555</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">الخدمة:</span>
                                <span class="detail-val" id="confirmService">تنظيف وتلميع الأسنان</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">التاريخ المحدد:</span>
                                <span class="detail-val" id="confirmDate">٢٠٢٦/٠٦/٣٠</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">الوقت المحجوز:</span>
                                <span class="detail-val" id="confirmTime">10:00 ص</span>
                            </div>
                        </div>

                        <a href="index" class="btn btn-primary">العودة للرئيسية</a>
                    </div>
                </div>
            </section>
        </main>

        <footer id="footer-wrapper"></footer>
    </div>

    <!-- Application Script Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Application Script Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="assets/js/app.js"></script>
    <script type="module" src="assets/js/booking.js"></script>
</body>
</html>
