<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="آراء وتقييمات المراجعين لعيادة الدكتور أكثم طنطاوي لطب وجراحة الفم والأسنان.">
    <title>آراء المراجعين - عيادة د. أكثم طنطاوي</title>
    <!-- Boxicons CDN for premium icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

    <!-- Mode Switcher Floating Panel -->
    <div class="mode-switch-panel">
        <div class="floating-switcher">
            <button id="viewLiveBtn" class="switcher-btn active" onclick=\"window.location.href='testimonials'\">
                <i class="bx bx-world"></i> الموقع التفاعلي
            </button>
            <button id="viewFigmaBtn" class="switcher-btn" onclick=\"window.location.href='figma'\">
                <i class="bx bx-palette"></i> Figma Mockups
            </button>
        </div>
    </div>

    <!-- MAIN APP ROOT -->
    <div id="app-root">
        <header id="header-nav"></header>

        <main class="main-content">
            <!-- PAGE 08: TESTIMONIALS PAGE -->
            <section id="testimonials-page" class="page-view">
                <div class="container testimonials-section">
                    <div class="section-header">
                        <span class="section-label">آراء المراجعين</span>
                        <h2 class="section-title">نحن فخورون بثقتكم الغالية</h2>
                        <p class="section-desc">ماذا يقول مرضانا عن تجربتهم العلاجية في عيادتنا؟</p>
                    </div>

                    <div class="testimonial-carousel">
                        <div class="testimonial-track" id="testimonialsTrack">
                            <div style="text-align:center; padding:40px; width:100%; color:var(--primary);"><i class="bx bx-loader-alt animate-spin" style="font-size:35px; margin-bottom:10px;"></i> جاري تحميل آراء المراجعين من السحابة...</div>
                        </div>
                        <div class="carousel-indicators" id="testimonialsIndicators"></div>
                    </div>
                </div>
            </section>
        </main>

        <footer id="footer-wrapper"></footer>
    </div>

    <!-- Application Script Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Application Script Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
